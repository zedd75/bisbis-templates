<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Site vitrine de restaurant" />

    <!-- Toutes les polices des 3 templates, en un seul chargement
         non bloquant (display=swap) :
         Playfair Display (titres), Inter (texte Essentiel/Signature),
         Cormorant Garamond (capitales Prestige), Lato (texte Prestige) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Inter:wght@400;600;700&family=Lato:wght@400;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
      rel="stylesheet"
    />

    <!-- Le vrai titre et les metas sont posés par le composant Seo
         à partir de la config du client. -->
    <title>Site vitrine</title>

    <!-- Aucun site choisi (?client=…) et aucun choix mémorisé dans
         l'onglet = première visite sur l'adresse nue : on envoie vers
         le showroom qui liste les 3 sites. S'exécute AVANT React,
         donc sans clignotement. Ne casse pas les liens ?client=… ni
         la navigation interne (le choix mémorisé fait foi). -->
    <script>
      (function () {
        var client = new URLSearchParams(location.search).get("client");
        if (!client && !sessionStorage.getItem("client")) {
          location.replace("/demos.html");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
